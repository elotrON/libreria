info:
  name: Prestar libro
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/prestamo"
  body:
    type: json
    data: |-
      {
        "usuarioId" : "1",
        "libroId" : "1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
